name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: 🔍 Verificación Preliminar
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then echo "Error: FTP_SERVER no está configurado"; exit 1; fi
          if [ -z "${{ secrets.FTP_USER }}" ]; then echo "Error: FTP_USER no está configurado"; exit 1; fi
          echo "Variables de entorno detectadas correctamente."

      - name: 📂 Sync files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: frontend/dist/frontend/browser/
          server-dir: public_html/
