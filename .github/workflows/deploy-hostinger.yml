name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Configure Runtime App Config
        shell: bash
        run: |
          if [ -z "${{ secrets.FRONTEND_API_URL }}" ]; then
            echo "❌ Error: FRONTEND_API_URL secret no está configurado";
            exit 1;
          fi

          API_URL="${{ secrets.FRONTEND_API_URL }}"
          GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"

          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            # Fallback to repo default if secret not set
            GOOGLE_CLIENT_ID="83015258138-h30gb9n5k9le48kt6amfgje39fgfr3dg.apps.googleusercontent.com"
          fi

          cat > ./frontend/src/assets/config.json <<EOF
          {
            "apiUrl": "$API_URL",
            "googleClientId": "$GOOGLE_CLIENT_ID"
          }
          EOF

          echo "✅ config.json generado para: $API_URL"

      - name: Build
        run: npm run build -- --configuration production
        working-directory: ./frontend

      - name: 📂 Sync files (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }}
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          password: ${{ secrets.SFTP_PASS }}
          local_path: ./frontend/dist/frontend/browser/
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}
          sftp_only: true
