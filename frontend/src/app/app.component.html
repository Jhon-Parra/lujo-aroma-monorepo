<!-- app.component.html -->
<div class="min-h-screen flex flex-col font-sans bg-cream selection:bg-gold selection:text-white">
  <!-- Navbar -->
  <app-navbar></app-navbar>

  <!-- Contenido Dinámico de las Páginas (El Home omite el top margin para que el navbar flote sobre él) -->
  <main [ngClass]="{
    'flex-grow min-h-screen pt-24 md:pt-28': isAdminRoute,
    'flex-grow relative': isHomeRoute && !isAdminRoute,
    'flex-grow mt-36 md:mt-[150px] relative': !isHomeRoute && !isAdminRoute
  }">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <app-footer *ngIf="!isAdminRoute"></app-footer>

  <!-- Floating Promotions Button -->
  <button *ngIf="!isAdminRoute && promotions.length > 0"
    (click)="filterByPromotions()"
    class="fixed bottom-28 right-6 bg-gold text-white p-4 rounded-full shadow-lg hover:scale-110 hover:shadow-xl transition-all z-50 flex items-center justify-center group"
    aria-label="Ver promociones">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" />
      </svg>
      <span class="absolute -top-2 -right-2 bg-white text-gold text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold shadow-sm border border-gold">
        {{ promotions.length }}
      </span>
    </div>
    <span class="absolute right-full mr-3 bg-white text-gold text-[10px] font-bold py-1.5 px-3 rounded-lg shadow-md opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none uppercase tracking-widest border border-gold/20">
      Ver Promociones
    </span>
  </button>

  <app-toast></app-toast>

  <!-- WhatsApp Floating Button -->
  <a *ngIf="!isAdminRoute && whatsappUrl" [href]="whatsappUrl" target="_blank" rel="noopener noreferrer"
    class="fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:scale-110 hover:shadow-xl transition-all z-50 flex items-center justify-center">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-whatsapp"
      viewBox="0 0 16 16">
      <path
        d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232" />
    </svg>
  </a>
</div>
