<main class="min-h-screen bg-cream pt-24 pb-16">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="text-center mb-12">
            <h1 class="font-serif text-4xl md:text-5xl text-charcoal mb-4">Tus Favoritos</h1>
            <p class="text-soft-charcoal font-sans tracking-wide">Colección personal de fragancias seleccionadas</p>
        </header>

        <!-- No Favorites State (Premium Empty State) -->
        <div *ngIf="favoriteProducts.length === 0"
            class="flex flex-col items-center justify-center py-24 text-center max-w-md mx-auto">
            <div class="w-24 h-24 rounded-full bg-white border border-[#ecece5] flex items-center justify-center mb-8 shadow-sm">
                <svg class="w-10 h-10 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z">
                    </path>
                </svg>
            </div>
            <h3 class="font-serif text-2xl text-charcoal mb-3">Tu colección está vacía</h3>
            <p class="text-soft-charcoal text-sm leading-relaxed mb-8">
                Guarda las fragancias que más te gusten tocando el ❤️ en cualquier producto. Las encontrarás aquí para comprarlas cuando quieras.
            </p>
            <a routerLink="/catalog"
                class="inline-flex items-center gap-2 bg-gold text-white px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs hover:bg-[#b59a68] transition-all duration-300 shadow-md hover:-translate-y-1 hover:shadow-xl">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Descubrir fragancias
            </a>
        </div>

        <!-- Favorites Grid -->
        <div *ngIf="favoriteProducts.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <app-product-card *ngFor="let product of favoriteProducts" [product]="product"></app-product-card>
        </div>
    </div>
</main>
