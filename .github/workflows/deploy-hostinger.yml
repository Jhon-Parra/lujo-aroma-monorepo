name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: 🔍 Verificación Preliminar
        run: |
          if [ -z "${{ secrets.FTP_USER }}" ]; then echo "❌ Error: FTP_USER no está configurado"; exit 1; fi
          if [ -z "${{ secrets.FTP_PASS }}" ]; then echo "❌ Error: FTP_PASS no está configurado"; exit 1; fi
          echo "✅ Secretos de usuario y contraseña detectados."
          echo "🌐 Verificando conectividad al puerto 21..."
          nc -zv -w 5 82.198.227.250 21 || echo "⚠️ Advertencia: El puerto 21 parece cerrado o bloqueado desde GitHub."

      - name: 📂 Sync files (SFTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.198.227.250
          username: u498956148
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./frontend/dist/frontend/browser/
          server-dir: domains/perfumissimocol.com/public_html/
          protocol: sftp
          port: 65002

